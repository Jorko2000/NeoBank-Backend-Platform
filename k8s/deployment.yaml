apiVersion: apps/v1
kind: Deployment
metadata:
  name: neobank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neobank
  template:
    metadata:
      labels:
        app: neobank
    spec:
      containers:
        - name: neobank
          image: neobank:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: neobank-service
spec:
  type: NodePort
  selector:
    app: neobank
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
